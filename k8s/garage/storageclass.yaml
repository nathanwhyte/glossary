---
# StorageClass for Garage volumes
# Uses Longhorn with single replica (Garage handles replication/quorum)
# Node selector uses Longhorn "garage" tag to place volumes on tagged nodes
# Disk selector uses "ssd" to ensure volumes use SSD disks
# Note: StorageClass is cluster-scoped, no namespace needed
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-garage
provisioner: driver.longhorn.io
parameters:
  numberOfReplicas: "1"
  nodeSelector: "garage"
  diskSelector: "ssd"
  staleReplicaTimeout: "2880"
  fromBackup: ""
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain

